<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>Latihan Barisan</title>

<style>
body {
  font-family: Arial;
  text-align: center;
  background: #0f172a;
  color: #fff;
}

.card {
  width: 480px;
  margin: 60px auto;
  padding: 20px;
  background: #1e293b;
  border-radius: 10px;
}

.option {
  background: #334155;
  margin: 6px 0;
  padding: 10px;
  border-radius: 6px;
  cursor: pointer;
}

.option:hover {
  background: #475569;
}

.benar {
  background: #16a34a !important;
}

.salah {
  background: #dc2626 !important;
}

button {
  margin-top: 10px;
  padding: 8px 14px;
  cursor: pointer;
}
</style>
</head>

<body>

<div class="card">
  <h3>Gas Maba, Tugas 17 Maret - 30 Maret 2026</h3>

  <div>
    Benar: <span id="b">0</span> |
    Salah: <span id="s">0</span>
  </div>

  <p id="q">...</p>
  <div id="opsi"></div>

  <button onclick="soalBaru()">Soal Baru</button>

  <p id="res"></p>
  <div id="exp" style="display:none;"></div>
</div>

<script>
let jawaban = 0
let udah = false

let b = 0
let s = 0

function r(min, max) {
  return Math.floor(Math.random() * (max - min + 1)) + min
}

// random urut array (biar gak monoton)
function acak(arr) {
  for (let i = arr.length - 1; i > 0; i--) {
    let j = Math.floor(Math.random() * (i + 1))
    ;[arr[i], arr[j]] = [arr[j], arr[i]]
  }
}

function bikinOpsi(bener) {
  let list = [bener]

  while (list.length < 5) {
    let fake = bener + r(-10, 10)
    if (!list.includes(fake)) list.push(fake)
  }

  acak(list)

  let huruf = ["A", "B", "C", "D", "E"]
  let html = ""

  list.forEach((x, i) => {
    html += `
      <div class="option" data="${x}" onclick="cek(this, ${x})">
        ${huruf[i]}. ${x}
      </div>
    `
  })

  document.getElementById("opsi").innerHTML = html
}

function soalBaru() {
  udah = false

  let start = r(1, 20)
  let beda = r(2, 10)

  let arr = []
  for (let i = 0; i < 5; i++) {
    arr.push(start + i * beda)
  }

  jawaban = start + 5 * beda

  document.getElementById("q").innerText =
    arr.join(", ") + ", ..."

  document.getElementById("res").innerText = ""
  document.getElementById("exp").style.display = "none"

  bikinOpsi(jawaban)
}

function cek(el, pilih) {
  if (udah) return
  udah = true

  let semua = document.querySelectorAll(".option")

  semua.forEach(o => {
    let val = parseInt(o.getAttribute("data"))

    if (val === jawaban) o.classList.add("benar")
    if (o === el && pilih !== jawaban) o.classList.add("salah")
  })

  if (pilih === jawaban) {
    b++
    document.getElementById("res").innerText = "benar"
  } else {
    s++
    document.getElementById("res").innerText = "salah, jawabannya " + jawaban
  }

  document.getElementById("b").innerText = b
  document.getElementById("s").innerText = s

  let exp = document.getElementById("exp")
  exp.innerText = "pola: tambah " + (jawaban - (jawaban - 5))
  exp.style.display = "block"
}

soalBaru()
</script>

</body>
</html>
