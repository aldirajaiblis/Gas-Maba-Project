<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>Latihan Barisan</title>

<style>
body {
  font-family: Arial;
  text-align: center;
  background: #0f172a;
  color: #fff;
}

.card {
  width: 500px;
  margin: 60px auto;
  padding: 20px;
  background: #1e293b;
  border-radius: 10px;
}

.option {
  background: #334155;
  margin: 6px 0;
  padding: 12px;
  border-radius: 6px;
  cursor: pointer;
  transition: 0.2s;
}

.option:hover {
  background: #475569;
}

.benar {
  background: #16a34a !important;
}

.salah {
  background: #dc2626 !important;
}

button {
  margin-top: 10px;
  padding: 8px 14px;
  border: none;
  border-radius: 6px;
  background: #2563eb;
  color: white;
  cursor: pointer;
}

button:hover {
  background: #1d4ed8;
}

#exp {
  margin-top: 12px;
  display: none;
  background: #020617;
  padding: 10px;
  border-radius: 6px;
}
</style>
</head>

<body>

<div class="card">
  <h2>Gas Maba, 17 Maret - 30 Maret</h2>

  <div>
    ✅ Benar: <span id="b">0</span> |
    ❌ Salah: <span id="s">0</span>
  </div>

  <p id="q">...</p>
  <div id="opsi"></div>

  <button onclick="soalBaru()">Soal Baru</button>
  <button onclick="resetScore()">Reset</button>

  <p id="res"></p>
  <div id="exp"></div>
</div>

<script>
let jawaban = 0
let udah = false
let expText = ""

let b = 0
let s = 0

function r(min, max) {
  return Math.floor(Math.random() * (max - min + 1)) + min
}

function acak(arr) {
  for (let i = arr.length - 1; i > 0; i--) {
    let j = Math.floor(Math.random() * (i + 1))
    ;[arr[i], arr[j]] = [arr[j], arr[i]]
  }
}

function bikinOpsi(bener) {
  let list = [bener]

  while (list.length < 5) {
    let fake = bener + r(-20, 20)
    if (!list.includes(fake)) list.push(fake)
  }

  acak(list)

  let huruf = ["A","B","C","D","E"]
  let html = ""

  list.forEach((x, i) => {
    html += `
      <div class="option" data="${x}" onclick="cek(this, ${x})">
        ${huruf[i]}. ${x}
      </div>
    `
  })

  document.getElementById("opsi").innerHTML = html
}

function soalBaru() {
  udah = false

  let tipe = r(1, 7)
  let arr = []

  switch(tipe) {

    case 1:
      let a1 = r(1,20)
      let d1 = r(2,10)
      for (let i = 0; i < 5; i++) arr.push(a1 + i * d1)
      jawaban = a1 + 5 * d1
      expText = "beda tetap +" + d1
      break

    case 2:
      let start = r(50,100)
      let besar = r(20,40)
      arr = [start]
      for (let i = 1; i < 5; i++) {
        arr.push(arr[i-1] + (i%2 ? 10 : besar))
      }
      jawaban = arr[4] + besar
      expText = "loncat +10 lalu +" + besar
      break

    case 3:
      let a3 = r(1,10)
      let d3 = r(3,10)
      arr = [a3, a3+1, a3-1]
      for (let i = 3; i < 6; i++) {
        arr.push(arr[i-3] + d3)
      }
      jawaban = arr[3]
      expText = "ulang 3 langkah, +" + d3
      break

    case 4:
      let a4 = r(1,10)
      let x = r(3,8)
      let y = r(10,20)
      arr = [a4]
      for (let i = 1; i < 6; i++) {
        arr.push(arr[i-1] + (i%2 ? x : y))
      }
      jawaban = arr[5]
      expText = "gantian +" + x + " dan +" + y
      break

    case 5:
      let a5 = r(1,5)
      arr = [a5, a5+1, a5+2]
      for (let i = 3; i < 6; i++) {
        arr.push(arr[i-3] * 2)
      }
      jawaban = arr[3]
      expText = "tiap 3 langkah x2"
      break

    case 6:
      let a6 = r(10,20)
      let p = r(3,10)
      let q = r(3,10)
      arr = [a6]
      for (let i = 1; i < 6; i++) {
        arr.push(arr[i-1] + (i%2 ? p : q))
      }
      jawaban = arr[5]
      expText = "pola +" + p + " lalu +" + q
      break

    case 7:
      let a7 = r(2,5)
      arr = [a7]
      let ops = ["+","-","x"]

      for (let i = 1; i < 6; i++) {
        if (ops[(i-1)%3] === "+") arr.push(arr[i-1] + i)
        else if (ops[(i-1)%3] === "-") arr.push(arr[i-1] - i)
        else arr.push(arr[i-1] * i)
      }

      jawaban = arr[5]
      expText = "operasi campur (+, -, x)"
      break
  }

  document.getElementById("q").innerText =
    arr.join(", ") + ", ..."

  document.getElementById("res").innerText = ""
  document.getElementById("exp").style.display = "none"

  bikinOpsi(jawaban)
}

function cek(el, pilih) {
  if (udah) return
  udah = true

  let semua = document.querySelectorAll(".option")

  semua.forEach(o => {
    let val = parseInt(o.getAttribute("data"))

    if (val === jawaban) o.classList.add("benar")
    if (o === el && pilih !== jawaban) o.classList.add("salah")
  })

  if (pilih === jawaban) {
    b++
    document.getElementById("res").innerText = "✅ benar"
  } else {
    s++
    document.getElementById("res").innerText =
      "❌ salah, jawabannya " + jawaban
  }

  document.getElementById("b").innerText = b
  document.getElementById("s").innerText = s

  let exp = document.getElementById("exp")
  exp.innerText = "pola: " + expText
  exp.style.display = "block"
}

function resetScore() {
  b = 0
  s = 0
  document.getElementById("b").innerText = b
  document.getElementById("s").innerText = s
}

soalBaru()
</script>

</body>
</html>
